<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil | Shop Ofe Trujillo</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #ff4da6, #ffc1e3);
}

.main-perfil {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.perfil-card {
    background:white;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
}

.perfil-header {
    text-align:center;
    margin-bottom:20px;
}

.avatar {
    width:80px;
    height:80px;
    border-radius:50%;
    background: linear-gradient(135deg,#ff4da6,#ff80bf);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:white;
    margin:0 auto 10px;
    font-weight:bold;
}

/* 🔥 GAFETE BLACK EDITION */
.badge-cliente {
    background: #000000;
    color: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.badge-cliente small { font-size: 10px; text-transform: uppercase; opacity: 0.9; }
.badge-cliente h2 { margin: 5px 0; font-size: 28px; letter-spacing: 4px; }
.puntos-tag {
    background: white;
    color: #ff4da6;
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 14px;
    margin-top: 5px;
}

.perfil-header h2 { margin:5px 0; color:#ff4da6; }
.perfil-header p { font-size:14px; color:#777; }

.section { margin-top:20px; }
.input-group { margin-bottom:12px; }
.input-group label { font-size:13px; color:#555; }
.input-group input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:5px;
}

.compra-item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.btn-primary { background:#ff4da6; color:white; }
.btn-secondary { background:#f2f2f2; }

@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="main-perfil">
    <div class="perfil-card">
        
        <div class="perfil-header">
            <div class="avatar" id="avatar">👤</div>
            <h2 id="nombre">Usuario</h2>
            <p id="email">correo@email.com</p>
        </div>

        <div class="badge-cliente">
            <small>Número de Clienta Oficial</small>
            <h2 id="clienteIdDisplay">000000</h2>
            <div class="puntos-tag">
                <i class="fas fa-star"></i> <span id="puntosDisplay">0</span> Puntos
            </div>
        </div>

        <div class="section" style="background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #ff4da6; text-align: center;">
            <h3 style="color: #ff4da6; margin: 0 0 10px 0;">💖 Reclamar mis Puntos <br> SOLO CLIENTAS FORANEAS</h3>
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Sube una foto de tu nota o tus productos para validar tu compra:</p>
            
            <label style="font-size: 13px; display: block; text-align: left; margin-bottom: 5px;">Monto total de la compra:</label>
            <input type="number" id="notaTotal" placeholder="$ 0.00" style="width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px;">
            
            <label style="font-size: 13px; display: block; text-align: left; margin-bottom: 5px;">Foto de tu nota o paquete:</label>
            <input type="file" id="fotoNota" accept="image/*" style="width: 100%; margin-bottom: 20px; font-size: 12px;">
            
            <button class="btn btn-primary" id="btnReclamar" onclick="enviarSolicitudSimple()">✨ Enviar para Revisión</button>
        </div>

        <div class="section">
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" id="inputNombre">
            </div>
            <div class="input-group">
                <label>Teléfono</label>
                <input type="text" id="inputTelefono">
            </div>
            <div class="input-group">
                <label>Dirección</label>
                <input type="text" id="inputDireccion">
            </div>
        </div>

        <div class="section">
            <h3>🛍️ Mis Compras Recientes</h3>
            <div id="historialCompras" style="font-size: 13px; max-height: 200px; overflow-y: auto;">
                <p>Cargando tus compras...</p>
            </div>
        </div>

        <div class="section">
            <h3>🔔 Notificaciones</h3>
            <ul id="listaNotis"></ul>
        </div>

        <button class="btn btn-primary" onclick="guardar()">💾 Guardar cambios</button>
        <button class="btn btn-secondary" onclick="logout()">🚪 Cerrar sesión</button>

        <div class="mensaje" id="mensaje"></div>
    </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { 
    doc, setDoc, getDoc, collection, query, where, getDocs, addDoc, increment 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 LÓGICA CON IMGBB (REEMPLAZA STORAGE)
window.enviarSolicitudSimple = async function() {
    const total = parseFloat(document.getElementById("notaTotal").value);
    const fileInput = document.getElementById("fotoNota");
    const file = fileInput.files[0];
    const usuarioLocal = JSON.parse(localStorage.getItem("usuario"));
    const btn = document.getElementById("btnReclamar");

    if (!total || !file) return alert("❌ Por favor escribe el total y sube la foto.");

    btn.innerText = "⏳ Subiendo imagen...";
    btn.disabled = true;

    try {
        // 1. Preparar datos para ImgBB
        const formData = new FormData();
        formData.append("image", file);

        // 2. Subir a ImgBB
        const response = await fetch("https://api.imgbb.com/1/upload?key=e5fca8fd3a72f235075cfa08e1370ee3", {
            method: "POST",
            body: formData
        });

        const imgData = await response.json();

        if (imgData.success) {
            const urlFoto = imgData.data.url;

            // 3. Guardar solicitud en Firestore
            await addDoc(collection(db, "solicitudes_puntos"), {
                email: usuarioLocal.email,
                nombreCliente: document.getElementById("nombre").innerText,
                monto: total,
                puntos: Math.floor(total / 10), // $10 = 1 punto
                foto: urlFoto,
                estado: "pendiente",
                fecha: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString()
            });

            alert("💖 ¡Solicitud enviada! En breve Ofe o el equipo validarán tus puntos.");
            location.reload();
        } else {
            throw new Error("Error en la respuesta de ImgBB");
        }

    } catch (e) {
        console.error(e);
        alert("Error al enviar la validación.");
        btn.disabled = false;
        btn.innerText = "✨ Enviar para Revisión";
    }
};

document.addEventListener("DOMContentLoaded", async () => {
    let usuarioLocal = JSON.parse(localStorage.getItem("usuario"));

    if(!usuarioLocal || !usuarioLocal.email){
        window.location.href = "login.html";
        return;
    }

    try {
        const ref = doc(db, "usuarios", usuarioLocal.email);
        const snap = await getDoc(ref);

        if(snap.exists()){
            let data = snap.data();

            document.getElementById("nombre").innerText = data.nombre || "Usuario";
            document.getElementById("email").innerText = data.email || usuarioLocal.email;
            document.getElementById("inputNombre").value = data.nombre || "";
            document.getElementById("inputTelefono").value = data.telefono || "";
            document.getElementById("inputDireccion").value = data.direccion || "";

            document.getElementById("clienteIdDisplay").innerText = data.clienteId || "000000";
            document.getElementById("puntosDisplay").innerText = data.puntos || 0;

            if(data.nombre){
                document.getElementById("avatar").innerText = data.nombre.charAt(0).toUpperCase();
            }

            if(data.clienteId) {
                cargarHistorial(data.clienteId);
            } else {
                document.getElementById("historialCompras").innerHTML = "<p>ID no encontrado.</p>";
            }
        }
    } catch (error) {
        console.error("Error cargando datos:", error);
    }
    
    cargarNotificaciones();
});

async function cargarHistorial(idCli) {
    const historialDiv = document.getElementById("historialCompras");
    
    try {
        const comprasRef = collection(db, "ventas");
        const qCompras = query(comprasRef, where("clienteId", "==", idCli));
        const comprasSnap = await getDocs(qCompras);

        historialDiv.innerHTML = "";

        if (comprasSnap.empty) {
            historialDiv.innerHTML = "<p>Aún no tienes compras registradas. ¡Te esperamos pronto! 💖</p>";
        } else {
            comprasSnap.forEach(compraDoc => {
                const c = compraDoc.data();
                historialDiv.innerHTML += `
                    <div class="compra-item">
                        <div style="display:flex; justify-content:space-between;">
                            <span><b>${c.dia}</b></span>
                            <span style="color:#ff4da6;">$${Number(c.total).toFixed(2)}</span>
                        </div>
                        <small style="color:#888;">Método: ${c.metodo}</small>
                    </div>
                `;
            });
        }
    } catch (e) {
        historialDiv.innerHTML = "<p>Error al cargar historial</p>";
        console.error(e);
    }
}

window.guardar = async function() {
    let usuarioLocal = JSON.parse(localStorage.getItem("usuario"));
    const clienteIdActual = document.getElementById("clienteIdDisplay").innerText;
    const puntosActual = parseInt(document.getElementById("puntosDisplay").innerText);

    let datos = {
        nombre: document.getElementById("inputNombre").value,
        telefono: document.getElementById("inputTelefono").value,
        direccion: document.getElementById("inputDireccion").value,
        email: usuarioLocal.email,
        clienteId: clienteIdActual, 
        puntos: puntosActual 
    };

    try {
        await setDoc(doc(db, "usuarios", datos.email), datos);
        localStorage.setItem("usuario", JSON.stringify(datos));
        document.getElementById("nombre").innerText = datos.nombre;
        document.getElementById("mensaje").innerText = "☁️ Perfil actualizado con éxito";
        setTimeout(() => document.getElementById("mensaje").innerText = "", 3000);
    } catch (error) {
        alert("Error al guardar");
    }
};

window.logout = function(){
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
};

function cargarNotificaciones(){
    let notis = JSON.parse(localStorage.getItem("notis")) || [];
    let lista = document.getElementById("listaNotis");
    lista.innerHTML = "";
    notis.slice().reverse().forEach(n => {
        let li = document.createElement("li");
        li.textContent = n;
        lista.appendChild(li);
    });
}
</script>
</body>
</html>
