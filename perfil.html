<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil | Shop Ofe Trujillo</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #ff4da6, #ffc1e3);
}

/* CONTENEDOR */
.main-perfil {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* TARJETA */
.perfil-card {
    background:white;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
}

/* HEADER PERFIL */
.perfil-header {
    text-align:center;
    margin-bottom:20px;
}

/* AVATAR */
.avatar {
    width:100px;
    height:100px;
    border-radius:50%;
    background: linear-gradient(135deg,#ff4da6,#ff80bf);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    color:white;
    margin:0 auto 10px;
    font-weight:bold;
    overflow:hidden;
}

.avatar img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* NOMBRE */
.perfil-header h2 {
    margin:5px 0;
    color:#ff4da6;
}

/* EMAIL */
.perfil-header p {
    font-size:14px;
    color:#777;
}

/* SECCIONES */
.section {
    margin-top:20px;
}

/* INPUTS */
.input-group {
    margin-bottom:12px;
}

.input-group label {
    font-size:13px;
    color:#555;
}

.input-group input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:5px;
}

/* BOTONES */
.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
    transition:0.3s;
}

.btn-primary {
    background:#ff4da6;
    color:white;
}

.btn-primary:hover {
    background:#e60073;
}

.btn-secondary {
    background:#f2f2f2;
}

.btn-secondary:hover {
    background:#ddd;
}

/* MENSAJE */
.mensaje {
    text-align:center;
    margin-top:10px;
    font-size:13px;
    color:green;
}

/* ANIMACIÓN */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="main-perfil">

<div class="perfil-card">

    <!-- HEADER -->
    <div class="perfil-header">
        <div class="avatar" id="avatar">👤</div>
        <h2 id="nombre">Usuario</h2>
        <p id="email">correo@email.com</p>
    </div>

    <!-- INFO -->
    <div class="section">

        <div class="input-group">
            <label>Nombre</label>
            <input type="text" id="inputNombre">
        </div>

        <div class="input-group">
            <label>Teléfono</label>
            <input type="text" id="inputTelefono">
        </div>

        <div class="input-group">
    <label>Correo electrónico</label>
    <input type="email" id="inputEmail">
</div>

        <div class="input-group">
            <label>Dirección</label>
            <input type="text" id="inputDireccion">
        </div>

    </div>

    <div class="section">
    <h3>🔔 Notificaciones</h3>
    <ul id="listaNotis"></ul>
</div>

    <!-- BOTONES -->
    <button class="btn btn-primary" onclick="guardar()">💾 Guardar cambios</button>
    <button class="btn btn-secondary" onclick="logout()">🚪 Cerrar sesión</button>

    <div class="mensaje" id="mensaje"></div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 CARGAR DATOS
document.addEventListener("DOMContentLoaded", async () => {

    let usuarioLocal = JSON.parse(localStorage.getItem("usuario"));

    if(!usuarioLocal || !usuarioLocal.email){
        window.location.href = "login.html";
        return;
    }

    try {

        const ref = doc(db, "usuarios", usuarioLocal.email);
        const snap = await getDoc(ref);

        if(snap.exists()){

            let data = snap.data();

            document.getElementById("nombre").innerText = data.nombre || "Usuario";
            document.getElementById("email").innerText = data.email || "";

            document.getElementById("inputNombre").value = data.nombre || "";
            document.getElementById("inputTelefono").value = data.telefono || "";
            document.getElementById("inputEmail").value = data.email || "";
            document.getElementById("inputDireccion").value = data.direccion || "";

            if(data.nombre){
                document.getElementById("avatar").innerText = data.nombre.charAt(0).toUpperCase();
            }

        } else {

            // 🔥 Si no existe en Firebase, usar localStorage
            document.getElementById("nombre").innerText = usuarioLocal.nombre || "Usuario";
            document.getElementById("email").innerText = usuarioLocal.email || "";

            document.getElementById("inputNombre").value = usuarioLocal.nombre || "";
            document.getElementById("inputTelefono").value = usuarioLocal.telefono || "";
            document.getElementById("inputEmail").value = usuarioLocal.email || "";
            document.getElementById("inputDireccion").value = usuarioLocal.direccion || "";

        }

    } catch (error) {
        console.error("Error cargando datos:", error);
    }

    cargarNotificaciones();

});


// 💾 GUARDAR
window.guardar = async function() {

    let usuarioLocal = JSON.parse(localStorage.getItem("usuario"));

    if(!usuarioLocal || !usuarioLocal.email){
        alert("Error: usuario no identificado");
        return;
    }

    let datos = {
        nombre: document.getElementById("inputNombre").value,
        telefono: document.getElementById("inputTelefono").value,
        direccion: document.getElementById("inputDireccion").value,
        email: document.getElementById("inputEmail").value
    };

    try {

        // 🔥 Guardar en Firebase
        await setDoc(doc(db, "usuarios", datos.email), datos);

        // 🔥 Guardar local (cache)
        localStorage.setItem("usuario", JSON.stringify(datos));

        // UI
        document.getElementById("nombre").innerText = datos.nombre;
        document.getElementById("email").innerText = datos.email;

        document.getElementById("mensaje").innerText = "☁️ Guardado en la nube";

    } catch (error) {
        console.error("Error guardando:", error);
        alert("Error al guardar");
    }
};


// 🚪 LOGOUT
window.logout = function(){
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
};


// 🔔 NOTIFICACIONES
function cargarNotificaciones(){

    let notis = JSON.parse(localStorage.getItem("notis")) || [];

    let lista = document.getElementById("listaNotis");
    lista.innerHTML = "";

    notis.slice().reverse().forEach(n => {
        let li = document.createElement("li");
        li.textContent = n;
        lista.appendChild(li);
    });
}

// 🔥 MENU GLOBAL
window.toggleMenu = function () {
    document.querySelector("header nav").classList.toggle("active");
};

</script>
</body>
</html>
