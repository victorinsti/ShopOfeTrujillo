<style>

/* 🔥 BODY FIX */
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4da6, #ff80bf);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 🔥 HEADER */
header {
    width:100%;
    position: relative;
    z-index: 1000;
}

/* 🔥 CONTENEDOR LOGIN */
.main-login {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* 🔥 CAJA */
.box {
    background:white;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
}

/* INPUTS */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BOTON */
button {
    width:100%;
    padding:12px;
    background:#ff4da6;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* ANIMACIÓN */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* 🔥 NAVBAR MOBILE FIX */
@media (max-width: 992px) {

    header nav {
        display: none;
        width: 100%;
    }

    header nav.active {
        display: block;
    }

    header nav ul {
        flex-direction: column;
        align-items: center;
        background: white;
        padding: 15px 0;
    }

    .menu-toggle {
        display: block;
        cursor: pointer;
    }
}

</style>
</head>
