<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Empleados</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* 🔥 BODY FIX */
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4da6, #ff80bf);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 🔥 HEADER */
header {
    width:100%;
    position: relative;
    z-index: 1000;
}

/* 🔥 CONTENEDOR LOGIN */
.main-login {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* 🔥 CAJA */
.box {
    background:white;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:320px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
}

/* INPUTS */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BOTON */
button {
    width:100%;
    padding:12px;
    background:#ff4da6;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* ANIMACIÓN */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* 🔥 NAVBAR MOBILE FIX */
@media (max-width: 992px) {

    header nav {
        display: none;
        width: 100%;
    }

    header nav.active {
        display: block;
    }

    header nav ul {
        flex-direction: column;
        align-items: center;
        background: white;
        padding: 15px 0;
    }

    .menu-toggle {
        display: block;
        cursor: pointer;
    }
}

</style>
</head>

<body>

<header>
<div class="container">

    <div class="logo">
        <a href="#">Shop Ofe Trujillo</a>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <nav>
         <ul>
             <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#productos">Productos</a></li>
            <li><a href="index.html#accesorios">Accesorios</a></li>
            <li><a href="index.html#envios">Envíos</a></li>
            <li><a href="index.html#novedades">Nosotros</a></li>
             <li><a href="login.html">Clientes</a></li>
            <li><a href="galeria.html#anuncios">Anuncios</a></li>
            <li><a href="galeria.html#galeria">Galeria</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
            <li><a href="acceso.html">Acceso</a></li>
        </ul>
    </nav>

</div>
</header>

<!-- 🔥 LOGIN -->
<div class="main-login">
    <div class="box">
        <h2>👤 Acceso Empleados</h2>

        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>
    </div>
</div>

<script type="module">
// Importamos lo necesario de Firebase (usa la misma versión que en tu panel)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Tu configuración (la misma que usas en el panel)
const firebaseConfig = {
    apiKey: "AIzaSyBDAOW-qrvxTcJVM4QNWPQvrmbz8wcAQLM",
    authDomain: "trujillo-digital-hub.firebaseapp.com",
    projectId: "trujillo-digital-hub",
    storageBucket: "trujillo-digital-hub.firebasestorage.app",
    messagingSenderId: "162799375782",
    appId: "1:162799375782:web:2be9127bfeaa613fd6ab67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Hacemos la función login global para que el botón la encuentre
window.login = async function() {
    let u = document.getElementById("user").value.toLowerCase().trim();
    let p = document.getElementById("pass").value.trim();

    if (!u || !p) {
        alert("Por favor llena ambos campos");
        return;
    }

    try {
        // Buscamos el documento que tiene como ID el nombre de usuario
        const docRef = doc(db, "empleados", u);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            let datosEmpleado = docSnap.data();

            // Validamos la contraseña que viene de la base de datos
            if (datosEmpleado.pass === p) {
                sessionStorage.setItem("acceso", "ok");
                sessionStorage.setItem("empleado", JSON.stringify({
                    user: u,
                    ...datosEmpleado
                }));
                window.location.href = "panel.html";
            } else {
                alert("❌ Contraseña incorrecta");
            }
        } else {
            alert("❌ Usuario no encontrado");
        }
    } catch (error) {
        console.error("Error al entrar:", error);
        alert("Ocurrió un error en la conexión");
    }
}
</script>

<script>
// Mantén tu función de menú fuera del módulo para que funcione siempre
function toggleMenu() {
    document.querySelector("nav").classList.toggle("active");
}
</script>

</body>
</html>
